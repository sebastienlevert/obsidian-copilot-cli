name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ConPTY bridge
        shell: pwsh
        run: |
          Set-Location conpty-bridge
          cargo build --release
          Write-Host "Binary size: $((Get-Item target/release/conpty-bridge.exe).Length / 1KB) KB"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release
        shell: pwsh
        run: |
          $out = "copilot-cli"
          New-Item -ItemType Directory -Path $out -Force

          # Core plugin files
          Copy-Item "main.js" "$out/"
          Copy-Item "manifest.json" "$out/"
          Copy-Item "styles.css" "$out/"

          # ConPTY bridge binary (~170KB, no ABI issues)
          Copy-Item "conpty-bridge/target/release/conpty-bridge.exe" "$out/"

          # Create zip for manual install
          Compress-Archive -Path "$out/*" -DestinationPath "copilot-cli.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            copilot-cli.zip
            main.js
            manifest.json
            styles.css
            conpty-bridge/target/release/conpty-bridge.exe
          generate_release_notes: true
